<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>User Registration</h2>

        <form id="registrationForm">
            <input type="text" id="name" placeholder="Enter Your Name" required>
            <input type="tel" id="phone" placeholder="Enter Your Phone Number" required>
            <input type="email" id="email" placeholder="Enter Your Email" required>
            <input type="text" id="skills" placeholder="Enter Your Skills" required>
            <input type="text" id="hobbies" placeholder="Enter Your Hobbies" required>
            
            <button type="submit">Submit</button>
        </form>

        <div class="output-box">
            <textarea id="output" placeholder="Your submitted data will appear here..." readonly></textarea>
            <button id="copyBtn" style="display:none;width: 80%;padding: auto;align-content: center;">Copy Data</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
